# Application Configuration
spring.application.name=payment-initiation-service

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.com.test.trestproject=DEBUG
logging.level.org.springframework.ws=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# SOAP Legacy Service Configuration
soap.legacy.url=http://localhost:8081/legacy/payments

# SOAP Mock Server (for testing without real legacy service)
# Set to true to enable internal mock SOAP service
soap.mock.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
