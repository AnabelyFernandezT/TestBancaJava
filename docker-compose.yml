version: '3.8'

services:
  # Payment Initiation Service
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-initiation-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SOAP_LEGACY_URL=http://soap-mock:8081/legacy/payments
      - SOAP_MOCK_ENABLED=false
    networks:
      - payment-network
    depends_on:
      - soap-mock
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Mock SOAP Service (for testing)
  soap-mock:
    image: mockserver/mockserver:latest
    container_name: soap-mock-server
    ports:
      - "8081:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/config/initializerJson.json
    volumes:
      - ./docker/mock-config:/config
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  payment-network:
    driver: bridge

volumes:
  payment-data:
