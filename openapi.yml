openapi: 3.0.3
info:
  title: Payment Initiation Service API
  description: |
    REST API microservice for payment initiation following BIAN (Banking Industry Architecture Network) standards.
    This service acts as a facade for a legacy SOAP service, providing modern REST endpoints for payment order management.
  version: 1.0.0
  contact:
    name: Payment Initiation Team
    email: payments@bank.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://localhost:8080/payment-initiation
    description: Local with context path

tags:
  - name: Payment Orders
    description: Payment order initiation and management operations (BIAN compliant)

paths:
  /payment-initiation/payment-orders:
    post:
      tags:
        - Payment Orders
      summary: Initiate a new payment order
      description: |
        Creates a new payment order in the system (BIAN: Initiate action).
        The order is submitted to the legacy SOAP service and stored locally.
      operationId: initiatePaymentOrder
      requestBody:
        required: true
        description: Payment order details
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentOrderRequest'
            examples:
              standardPayment:
                summary: Standard payment example
                value:
                  externalReference: "EXT-123"
                  debtorAccount:
                    iban: "EC12DEBTOR"
                  creditorAccount:
                    iban: "EC98CREDITOR"
                  instructedAmount:
                    amount: 150.75
                    currency: "USD"
                  remittanceInformation: "Factura 001-123"
                  requestedExecutionDate: "2025-10-31"
      responses:
        '201':
          description: Payment order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrderResponse'
              examples:
                created:
                  summary: Successful creation
                  value:
                    paymentOrderId: "PO-0001"
                    externalReference: "EXT-123"
                    debtorAccount:
                      iban: "EC12DEBTOR"
                    creditorAccount:
                      iban: "EC98CREDITOR"
                    instructedAmount:
                      amount: 150.75
                      currency: "USD"
                    remittanceInformation: "Factura 001-123"
                    requestedExecutionDate: "2025-10-31"
                    status: "ACCEPTED"
                    createdAt: "2025-03-23T10:30:00"
                    lastUpdate: "2025-03-23T10:30:00"
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment-initiation/payment-orders/{paymentOrderId}:
    get:
      tags:
        - Payment Orders
      summary: Retrieve a payment order
      description: |
        Retrieves detailed information about a specific payment order (BIAN: Retrieve action).
      operationId: retrievePaymentOrder
      parameters:
        - name: paymentOrderId
          in: path
          required: true
          description: Unique identifier of the payment order
          schema:
            type: string
            example: "PO-0001"
      responses:
        '200':
          description: Payment order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrderResponse'
        '404':
          description: Payment order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment-initiation/payment-orders/{paymentOrderId}/status:
    get:
      tags:
        - Payment Orders
      summary: Retrieve payment order status
      description: |
        Retrieves the current status of a payment order (BIAN: Retrieve BQ - Behavior Qualifier).
        This endpoint queries the legacy SOAP service for the latest status.
      operationId: retrievePaymentOrderStatus
      parameters:
        - name: paymentOrderId
          in: path
          required: true
          description: Unique identifier of the payment order
          schema:
            type: string
            example: "PO-0001"
      responses:
        '200':
          description: Payment order status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrderStatusResponse'
              examples:
                settled:
                  summary: Settled payment
                  value:
                    paymentOrderId: "PO-0001"
                    status: "SETTLED"
                    lastUpdate: "2025-10-30T16:25:30"
        '404':
          description: Payment order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    PaymentOrderRequest:
      type: object
      required:
        - externalReference
        - debtorAccount
        - creditorAccount
        - instructedAmount
        - requestedExecutionDate
      properties:
        externalReference:
          type: string
          description: External reference identifier for the payment
          example: "EXT-123"
        debtorAccount:
          $ref: '#/components/schemas/AccountReference'
        creditorAccount:
          $ref: '#/components/schemas/AccountReference'
        instructedAmount:
          $ref: '#/components/schemas/InstructedAmount'
        remittanceInformation:
          type: string
          description: Payment description or reference information
          example: "Factura 001-123"
        requestedExecutionDate:
          type: string
          format: date
          description: Requested date for payment execution (ISO 8601 format)
          example: "2025-10-31"

    PaymentOrderResponse:
      type: object
      properties:
        paymentOrderId:
          type: string
          description: Unique identifier assigned by the system
          example: "PO-0001"
        externalReference:
          type: string
          description: External reference identifier
          example: "EXT-123"
        debtorAccount:
          $ref: '#/components/schemas/AccountReference'
        creditorAccount:
          $ref: '#/components/schemas/AccountReference'
        instructedAmount:
          $ref: '#/components/schemas/InstructedAmount'
        remittanceInformation:
          type: string
          description: Payment description
          example: "Factura 001-123"
        requestedExecutionDate:
          type: string
          format: date
          example: "2025-10-31"
        status:
          type: string
          description: Current status of the payment order
          enum:
            - ACCEPTED
            - PENDING
            - SETTLED
            - REJECTED
            - CANCELLED
          example: "ACCEPTED"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the payment order was created
          example: "2025-03-23T10:30:00"
        lastUpdate:
          type: string
          format: date-time
          description: Timestamp of the last update
          example: "2025-03-23T10:30:00"

    PaymentOrderStatusResponse:
      type: object
      properties:
        paymentOrderId:
          type: string
          description: Unique identifier of the payment order
          example: "PO-0001"
        status:
          type: string
          description: Current status of the payment order
          enum:
            - ACCEPTED
            - PENDING
            - SETTLED
            - REJECTED
            - CANCELLED
          example: "SETTLED"
        lastUpdate:
          type: string
          format: date-time
          description: Timestamp of the last status update
          example: "2025-10-30T16:25:30"

    AccountReference:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
          description: International Bank Account Number
          example: "EC12DEBTOR"
          pattern: '^[A-Z]{2}[0-9]{2}[A-Z0-9]+$'

    InstructedAmount:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          format: decimal
          description: Payment amount
          example: 150.75
          minimum: 0.01
        currency:
          type: string
          description: ISO 4217 currency code
          example: "USD"
          pattern: '^[A-Z]{3}$'

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2025-03-23T10:30:00"
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error type
          example: "Bad Request"
        message:
          type: string
          description: Error message
          example: "Invalid request data"
